name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    # 每天 UTC 03:00 执行（北京时间 11:00）
    - cron: '0 3 * * *'

jobs:
  check-and-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest picoclaw version
        id: get_version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/sipeed/picoclaw/releases/latest | jq -r '.tag_name')
          if [ "$VERSION" = "null" ] || [ -z "$VERSION" ]; then
            echo "Failed to get version"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Latest picoclaw version: $VERSION"

      - name: Check if build is needed
        id: check_build
        if: github.event_name == 'schedule'
        run: |
          LATEST="${{ steps.get_version.outputs.version }}"
          # 检查 GHCR 上是否已有该版本的镜像
          # 通过 GitHub API 查询 packages 的 tags
          TAGS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://ghcr.io/v2/lostmaniac/picoclaw-dev/tags/list" 2>/dev/null || echo "")

          if echo "$TAGS" | jq -e --arg tag "$LATEST" '.tags | index($tag)' >/dev/null 2>&1; then
            echo "Image with tag $LATEST already exists, skipping build"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "New version $LATEST detected, build needed"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        if: steps.check_build.outputs.should_build != 'false'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check_build.outputs.should_build != 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.check_build.outputs.should_build != 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        if: steps.check_build.outputs.should_build != 'false'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/lostmaniac/picoclaw-dev
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.get_version.outputs.version }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push Docker image
        if: steps.check_build.outputs.should_build != 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
